schema_version: "memorycore.config.v0.1"

enabled: false

core:
  db_path: "./data/memory.db"
  persona_id: "default"
  auto_migrate: true
  enable_fts: true

retrieval:
  use_fts: true
  use_mirror: false
  final_memory_count: 8
  context_budget_tokens: 1200
  allow_historical: false
  allow_deep_archive: false
  sensitivity_permission: "normal"

query_analysis:
  provider: "none"
  mode: "rule_only"
  sidecar_url: "http://127.0.0.1:8765"
  timeout_ms: 1500
  min_confidence_to_override: 0.72
  min_entity_semantic_confidence: 0.70
  min_rule_fit: 0.66
  min_anchor_readiness: 0.45
  semantic_need: 0.58
  min_complexity_for_semantic: 0.50
  full_semantic_complexity: 0.72
  decompose_complexity: 0.80
  min_semantic_field_confidence: 0.70
  min_override_margin: 0.08
  high_safety_risk: 0.80
  max_query_rewrites: 5
  max_semantic_anchors: 8
  semantic_total_energy_cap: 5.0
  max_generated_dense_weight_sum: 3.0
  include_rationale_summary: false

sidecar:
  enabled: false
  url: ""
  adapter: "trivium"
  total_timeout_ms: 400
  mirror_timeout_ms: 80
  activation_timeout_ms: 150
  rerank_timeout_ms: 100
  breaker_enabled: true
  breaker_window: 20
  breaker_failure_threshold: 3
  breaker_open_ms: 60000
  activation_max_edges_scanned_per_request: 10000
  activation_max_neighbors_per_node: 100
  activation_max_wall_ms: 120

retention:
  jobs:
    - "daily_ttl_expiry"
  deep_archive_after_days: 0

mirror:
  sync_limit: 100
