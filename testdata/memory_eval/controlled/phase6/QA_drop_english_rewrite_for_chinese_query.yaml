schema_version: memory_eval.v0.2
suite: controlled_phase6
allow_stub: true
case_id: QA_drop_english_rewrite_for_chinese_query
description: CJK-heavy raw queries drop long English semantic rewrites while preserving CJK rewrites for dense recall.
seed:
  sessions:
    - id: s1
      channel: api
  entities:
    - id: user
      canonical_name: Long
      entity_type: user
  episodes:
    - id: ep1
      session_id: s1
      content: 用户喜欢手冲咖啡。
      occurred_at: "2026-04-28T09:00:00+08:00"
steps:
  - id: coffee_fact
    action: fact
    fact:
      id: fact_pour_over
      subject_entity_id: user
      predicate: likes
      object_literal: 手冲咖啡
      content_summary: 用户喜欢手冲咖啡。
      source_episode_ids: [ep1]
      confidence: explicit
      importance: 0.8
  - id: retrieve
    action: retrieve
    semantic_query_analysis_stub:
      status: ok
      provider: eval_semantic_stub
      model: stub-v1
      prompt_version: phase6-controlled
      analysis:
        time_mode: current
        memory_domain: user_profile_memory
        memory_ability: direct_fact
        evidence_need: exact_observation
        confidence: 0.95
        query_rewrites:
          - text: when did the user say they enjoy pour over coffee in the morning
            purpose: semantic_recall
            weight: 0.8
          - text: 用户喜欢手冲咖啡
            purpose: semantic_recall
            weight: 0.7
    mirror_stub:
      index_mapped_nodes:
        - node_id: $coffee_fact.fact_id
          node_type: fact
      candidates:
        - node_id: $coffee_fact.fact_id
          node_type: fact
          score: 0.99
          source: semantic_rewrite_dense
          rank: 1
    retrieve:
      session_id: s1
      query_text: 我是不是喜欢手冲咖啡
      policy:
        use_mirror: true
        use_fts: false
        final_memory_count: 1
assertions:
  - type: query_analysis
    name: English rewrite is dropped for CJK-heavy query
    step: retrieve
    source: merged
    status: ok
    query_rewrites: [用户喜欢手冲咖啡]
    dropped_rewrite_count: 1
    dropped_rewrite_reasons: [rewrite_language_mismatch]
    english_rewrite_count: 1
  - type: mirror_candidate
    name: mirror receives raw plus surviving CJK rewrite only
    step: retrieve
    status: used
    query_count: 2
    raw_query_count: 1
    rewrite_query_count: 1
  - type: selected_recall_at_k
    name: selected context recalls coffee fact
    step: retrieve
    relevant_node_ids: [$coffee_fact.fact_id]
    at: 4
    min: 1.0
