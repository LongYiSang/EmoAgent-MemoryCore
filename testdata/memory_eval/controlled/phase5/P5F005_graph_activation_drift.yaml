case_id: P5F005_graph_activation_drift
description: "Phase 5F graph activation fixture: related candidate can enter context while hub, unrelated, and stale nodes do not."
seed:
  sessions:
    - id: s1
      channel: api
  entities:
    - id: user
      canonical_name: Long
      entity_type: user
  episodes:
    - id: ep1
      session_id: s1
      content: 我喜欢咖啡，但早会会带来压力。
      occurred_at: "2026-04-28T09:00:00+08:00"
steps:
  - id: seed_fact
    action: consolidate
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: 咖啡
        content_summary: 用户喜欢咖啡。
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 0.95
  - id: related_fact
    action: consolidate
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: dislikes
        object_literal: 早会
        content_summary: 用户不喜欢早会。
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 0.9
  - id: hub_fact
    action: consolidate
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: 通用工作
        content_summary: 用户喜欢通用工作话题。
        source_episode_ids: [ep1]
        confidence: inferred
        importance: 0.1
  - id: unrelated_fact
    action: consolidate
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: 旅行
        content_summary: 用户喜欢旅行。
        source_episode_ids: [ep1]
        confidence: inferred
        importance: 0.1
  - id: stale_fact
    action: consolidate
    fact_override:
      visibility_status: hidden
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: 旧密钥
        content_summary: 用户喜欢旧密钥。
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 1.0
  - id: retrieve
    action: retrieve
    mirror_stub:
      index_mapped_nodes:
        - node_id: $seed_fact.fact_id
          node_type: fact
        - node_id: $related_fact.fact_id
          node_type: fact
        - node_id: $hub_fact.fact_id
          node_type: fact
        - node_id: $unrelated_fact.fact_id
          node_type: fact
        - node_id: $stale_fact.fact_id
          node_type: fact
      candidates:
        - node_id: $seed_fact.fact_id
          node_type: fact
          score: 0.99
          rank: 1
    graph_activation_stub:
      candidates:
        - node_id: $related_fact.fact_id
          node_type: fact
          score: 0.95
          source: graph_activation
          rank: 1
          path_node_ids: [$seed_fact.fact_id, $related_fact.fact_id]
          path_link_types: [CAUSED_BY]
        - node_id: $hub_fact.fact_id
          node_type: fact
          score: 0.20
          source: graph_activation
          rank: 2
        - node_id: $unrelated_fact.fact_id
          node_type: fact
          score: 0.10
          source: graph_activation
          rank: 3
        - node_id: $stale_fact.fact_id
          node_type: fact
          score: 0.98
          source: graph_activation
          rank: 4
    retrieve:
      session_id: s1
      query_text: nosqlitematch
      policy:
        use_mirror: true
        final_memory_count: 2
assertions:
  - type: memory_contains
    step: retrieve
    node_id: $seed_fact.fact_id
  - type: memory_contains
    step: retrieve
    node_id: $related_fact.fact_id
  - type: forbidden_recall_zero
    step: retrieve
    forbidden_node_ids:
      - $hub_fact.fact_id
      - $unrelated_fact.fact_id
      - $stale_fact.fact_id
  - type: graph_activation_candidate
    step: retrieve
    node_id: $related_fact.fact_id
    source: graph_activation
    rank: 1
  - type: graph_activation_candidate
    step: retrieve
    node_type: fact
    source: graph_activation
    rank: 4
    suppression_reason: dropped_by_authority_filter
