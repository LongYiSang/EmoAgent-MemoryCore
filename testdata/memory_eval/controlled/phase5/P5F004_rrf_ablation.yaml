case_id: P5F004_rrf_ablation
description: "Phase 5F synthetic ablation: sparse-only single source misses the target, while sparse+mirror hybrid RRF selects it."
seed:
  sessions:
    - id: s1
      channel: api
  entities:
    - id: user
      canonical_name: Long
      entity_type: user
  episodes:
    - id: ep1
      session_id: s1
      content: User likes latte, but the calibration checklist is only a distractor.
      occurred_at: "2026-04-28T09:00:00+08:00"
steps:
  - id: target
    action: consolidate
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: latte
        content_summary: User likes latte.
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 0.5
  - id: sparse_distractor
    action: consolidate
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: latte calibration checklist
        content_summary: User likes latte calibration checklist.
        source_episode_ids: [ep1]
        confidence: inferred
        importance: 0.5
  - id: baseline
    action: retrieve
    retrieve:
      session_id: s1
      query_text: latte calibration
      policy:
        use_mirror: false
        use_fts: false
        final_memory_count: 1
  - id: hybrid
    action: retrieve
    mirror_stub:
      index_mapped_nodes:
        - node_id: $target.fact_id
          node_type: fact
      candidates:
        - node_id: $target.fact_id
          node_type: fact
          score: 0.97
          source: eval_dense
          rank: 1
    retrieve:
      session_id: s1
      query_text: latte calibration
      policy:
        use_mirror: true
        use_fts: false
        final_memory_count: 1
assertions:
  - type: memory_contains
    step: baseline
    node_id: $sparse_distractor.fact_id
  - type: memory_not_contains
    step: baseline
    node_id: $target.fact_id
  - type: anchor_fusion
    step: baseline
    node_id: $target.fact_id
    source: sqlite_sparse
    rank: 2
  - type: memory_contains
    step: hybrid
    node_id: $target.fact_id
  - type: anchor_fusion
    step: hybrid
    node_id: $target.fact_id
    source: eval_dense
    rank: 1
  - type: anchor_fusion
    step: hybrid
    node_id: $target.fact_id
    source: sqlite_sparse
    rank: 2
  - type: ablation_improves
    step: hybrid
    compare_step: baseline
    relevant_node_ids: [$target.fact_id]
    at: 1
