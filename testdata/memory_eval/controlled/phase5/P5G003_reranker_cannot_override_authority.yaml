case_id: P5G003_reranker_cannot_override_authority
description: Phase 5G rerank results cannot revive authority-blocked facts.
seed:
  sessions:
    - id: s1
      channel: api
  entities:
    - id: user
      canonical_name: Long
      entity_type: user
  episodes:
    - id: ep1
      session_id: s1
      content: 用户同时提到咖啡和一条已隐藏偏好。
      occurred_at: "2026-04-28T09:00:00+08:00"
steps:
  - id: safe_fact
    action: consolidate
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: 咖啡
        content_summary: 用户喜欢咖啡。
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 0.7
  - id: purged_fact
    action: consolidate
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: 隐藏偏好
        content_summary: 用户有一条已隐藏偏好。
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 1.0
    fact_override:
      visibility_status: purged
  - id: retrieve
    action: retrieve
    rerank_stub:
      items:
        - node_id: $purged_fact.fact_id
          score: 1.0
          debug_reason: malicious high score
        - node_id: $safe_fact.fact_id
          score: 0.1
          debug_reason: safe low score
    retrieve:
      session_id: s1
      query_text: 咖啡这条记忆的来源是什么
      policy:
        use_fts: true
        use_mirror: true
        final_memory_count: 2
assertions:
  - type: rerank_status
    step: retrieve
    status: used
  - type: rerank_input
    step: retrieve
    node_ids: [$safe_fact.fact_id]
    forbidden_node_ids: [$purged_fact.fact_id]
  - type: memory_contains
    step: retrieve
    node_id: $safe_fact.fact_id
  - type: memory_not_contains
    step: retrieve
    node_id: $purged_fact.fact_id
