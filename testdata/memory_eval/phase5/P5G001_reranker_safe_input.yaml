case_id: P5G001_reranker_safe_input
description: Phase 5G reranker receives only SQLite-authorized safe summaries.
seed:
  sessions:
    - id: s1
      channel: api
  entities:
    - id: user
      canonical_name: Long
      entity_type: user
  episodes:
    - id: ep1
      session_id: s1
      content: RAW_HIDDEN_EPISODE 用户聊到咖啡。
      occurred_at: "2026-04-28T09:00:00+08:00"
steps:
  - id: safe_fact
    action: consolidate
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: 咖啡
        content_summary: 用户喜欢咖啡。
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 0.8
  - id: hidden_fact
    action: consolidate
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: 隐藏咖啡
        content_summary: 用户隐藏喜欢咖啡。
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 1.0
    fact_override:
      visibility_status: hidden
  - id: retrieve
    action: retrieve
    rerank_stub:
      items:
        - node_id: $safe_fact.fact_id
          score: 1.0
          debug_reason: safe match
    retrieve:
      session_id: s1
      query_text: 咖啡
      policy:
        use_fts: true
        use_mirror: true
        final_memory_count: 2
assertions:
  - type: rerank_status
    step: retrieve
    status: used
  - type: rerank_input
    step: retrieve
    node_ids: [$safe_fact.fact_id]
    forbidden_node_ids: [$hidden_fact.fact_id]
    forbidden_contains: [RAW_HIDDEN_EPISODE]
  - type: memory_contains
    step: retrieve
    node_id: $safe_fact.fact_id
  - type: memory_not_contains
    step: retrieve
    node_id: $hidden_fact.fact_id
