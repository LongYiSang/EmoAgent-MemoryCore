case_id: P5F006_context_chain_correctness
description: Phase 5F validates thin context reconstruction chain fields without graph scoring.
seed:
  sessions:
    - id: s1
      channel: api
  entities:
    - id: user
      canonical_name: Long
      entity_type: user
    - id: shanghai
      canonical_name: 上海
      entity_type: place
    - id: hangzhou
      canonical_name: 杭州
      entity_type: place
  episodes:
    - id: ep1
      session_id: s1
      content: 我住在上海。
      occurred_at: "2026-04-28T09:00:00+08:00"
    - id: ep2
      session_id: s1
      content: 我现在住在杭州。
      occurred_at: "2026-04-28T10:00:00+08:00"
steps:
  - id: old_location
    action: consolidate
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: lives_in
        object_entity_id: shanghai
        content_summary: 用户住在上海。
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 0.8
  - id: new_location
    action: consolidate
    consolidate:
      session_id: s1
      candidate:
        subject_entity_id: user
        predicate: lives_in
        object_entity_id: hangzhou
        content_summary: 用户住在杭州。
        source_episode_ids: [ep2]
        confidence: explicit
        importance: 0.9
  - id: historical
    action: retrieve
    retrieve:
      session_id: s1
      query_text: 以前住在上海，现在住在杭州有什么变化
      policy:
        allow_historical: true
        final_memory_count: 4
assertions:
  - type: selected_chain_correct
    step: historical
    block_type: historical_context
    node_id: $new_location.fact_id
    node_ids: [$old_location.fact_id]
    link_type: SUPERSEDES
    direction: outbound
    historical_status: current
    source_ref_count: 1
  - type: block_contains
    step: historical
    block_type: historical_context
    node_id: $old_location.fact_id
  - type: block_contains
    step: historical
    block_type: historical_context
    node_id: $new_location.fact_id
