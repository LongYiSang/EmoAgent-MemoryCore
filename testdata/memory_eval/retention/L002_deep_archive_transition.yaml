case_id: L002_deep_archive_transition
description: retention_run can move old archived facts to deep_archived while default retrieval still blocks them.
seed:
  sessions:
    - id: s1
      channel: api
  entities:
    - id: user
      canonical_name: Long
      entity_type: user
  episodes:
    - id: ep1
      session_id: s1
      content: I used to consider switching teams last year.
      occurred_at: "2025-01-10T09:00:00+08:00"
steps:
  - id: old_fact
    action: consolidate
    fact_override:
      lifecycle_status: archived
      updated_at: "2025-02-01T00:00:00Z"
    consolidate:
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: switching teams
        content_summary: User considered switching teams last year.
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 0.4
  - id: retain
    action: retention_run
    retention_run:
      now: "2026-02-01T00:00:00Z"
      deep_archive_after_days: 180
  - id: current_retrieval
    action: retrieve
    retrieve:
      session_id: s1
      query_text: switching teams
  - id: deep_retrieval
    action: retrieve
    retrieve:
      session_id: s1
      query_text: switching teams
      policy:
        allow_deep_archive: true
assertions:
  - type: fact_column
    fact_id: $old_fact.fact_id
    column: lifecycle_status
    equals: deep_archived
  - type: memory_not_contains
    step: current_retrieval
    node_id: $old_fact.fact_id
  - type: memory_contains
    step: deep_retrieval
    node_id: $old_fact.fact_id
    summary: User considered switching teams last year.
