case_id: R010_phase5b_anchor_fusion
description: Phase 5B exposes deterministic anchor fusion diagnostics for fact seeds.
seed:
  sessions:
    - id: s1
      channel: api
  entities:
    - id: user
      canonical_name: Long
      entity_type: user
      aliases:
        - id: alias_longyi
          alias: LongYi
          alias_type: nickname
          confidence: 0.9
  episodes:
    - id: ep1
      session_id: s1
      content: 我喜欢咖啡。
      occurred_at: "2026-04-28T09:00:00+08:00"
steps:
  - id: fact
    action: consolidate
    consolidate:
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: 咖啡
        content_summary: 用户喜欢咖啡。
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 0.7
  - id: retrieve
    action: retrieve
    retrieve:
      session_id: s1
      query_text: LongYi 咖啡
      policy:
        use_fts: true
assertions:
  - type: anchor_fusion
    step: retrieve
    node_type: fact
    node_id: $fact.fact_id
    source: alias_match
    rank: 1
  - type: memory_contains
    step: retrieve
    node_id: $fact.fact_id
    summary: 用户喜欢咖啡。
