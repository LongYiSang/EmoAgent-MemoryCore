case_id: F003_source_redact_recent_episode
description: source_redact 清理 episode 原文、写 tombstone，并让依赖该证据的 fact 不再被 retrieval 返回。
seed:
  sessions:
    - id: s1
      channel: api
  entities:
    - id: user
      canonical_name: Long
      entity_type: user
  episodes:
    - id: ep1
      session_id: s1
      content: 我喜欢乌龙茶。
      occurred_at: "2026-04-28T09:00:00+08:00"
steps:
  - id: fact
    action: consolidate
    consolidate:
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: 乌龙茶
        content_summary: 用户喜欢乌龙茶。
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 0.7
  - id: forget
    action: forget
    forget:
      actor: user
      reason_code: user_requested
      level: source_redact
      target:
        scope_mode: exact_node
        node_type: episode
        node_id: ep1
  - id: retrieve
    action: retrieve
    retrieve:
      session_id: s1
      query_text: 乌龙茶
assertions:
  - type: memory_not_contains
    step: retrieve
    node_id: $fact.fact_id
  - type: fact_column
    fact_id: $fact.fact_id
    column: visibility_status
    equals: visible
  - type: episode_tombstone_exists
    episode_id: ep1
  - type: deletion_event_safe
    step: forget
    forbidden_contains: [我喜欢乌龙茶, 用户喜欢乌龙茶]
