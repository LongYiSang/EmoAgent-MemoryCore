case_id: F005_rebuild_search_after_soft_forget
description: soft forget 后重建 search 不应把隐藏 fact 的语义文本写回 fallback/FTS。
seed:
  sessions:
    - id: s1
      channel: api
  entities:
    - id: user
      canonical_name: Long
      entity_type: user
  episodes:
    - id: ep1
      session_id: s1
      content: 我喜欢茉莉花茶。
      occurred_at: "2026-04-28T09:00:00+08:00"
steps:
  - id: fact
    action: consolidate
    consolidate:
      candidate:
        subject_entity_id: user
        predicate: likes
        object_literal: 茉莉花茶
        content_summary: 用户喜欢茉莉花茶。
        source_episode_ids: [ep1]
        confidence: explicit
        importance: 0.7
  - id: forget
    action: forget
    forget:
      actor: user
      reason_code: user_requested
      level: soft_forget
      target:
        scope_mode: exact_node
        node_type: fact
        node_id: $fact.fact_id
  - id: rebuild
    action: rebuild_search
    rebuild_search: {}
  - id: retrieve
    action: retrieve
    retrieve:
      session_id: s1
      query_text: 茉莉花茶
assertions:
  - type: search_absent
    node_type: fact
    node_id: $fact.fact_id
    search_text: 茉莉花茶
  - type: memory_not_contains
    step: retrieve
    node_id: $fact.fact_id
  - type: fact_column
    fact_id: $fact.fact_id
    column: visibility_status
    equals: hidden
