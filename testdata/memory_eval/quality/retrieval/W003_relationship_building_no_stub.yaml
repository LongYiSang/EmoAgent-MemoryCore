schema_version: memory_eval.v0.2
suite: quality_retrieval
quality_mode: true
allow_stub: false
case_id: W003_relationship_building_no_stub
description: >
  No-stub offline retrieval world testing progressive relationship-building memory
  between user 鸡翅 and AI Agent 小星. Timeline spans April–May 2026 through five
  relationship stages: acquaintance → preference sharing → vulnerability → trust →
  friendship milestone. Queries use semantically related but lexically distinct
  phrasing (descriptions, indirect references, multi-hop linking). Covers fact recall,
  historical transitions, causal chains, provenance, relationship narrative, and premise checks.
