      entity_type: user
    - id: agent_xiaoxing
      canonical_name: 小星
      entity_type: agent
    - id: tuanzi_cat
      canonical_name: 团子
      entity_type: object
    - id: binjiang_park
      canonical_name: 滨江公园
      entity_type: place
    - id: yunqi_cafe
      canonical_name: 云栖咖啡
      entity_type: place
    - id: xingqiao_apartment
      canonical_name: 星桥公寓
      entity_type: place
    - id: grandma
      canonical_name: 奶奶
      entity_type: person
  episodes:
    # ── Stage 1: Acquaintance ──
    - id: ep_first_meeting
      session_id: s_seed
      content: 我是鸡翅，从今天开始你会作为我的日常伙伴，我叫你小星吧。
      occurred_at: "2026-04-01T20:00:00+08:00"
    # ── Stage 2: Preference sharing ──
    - id: ep_music_laufey
      session_id: s_seed
      content: 我最近在听Laufey的From The Start，很喜欢那种爵士流行的感觉。
      occurred_at: "2026-04-03T21:30:00+08:00"
    - id: ep_food_cantonese
      session_id: s_seed
      content: 我不太能吃辣，但特别喜欢粤菜里的白切鸡和煲仔饭。
      occurred_at: "2026-04-05T19:00:00+08:00"
    - id: ep_cat_tuanzi
      session_id: s_seed
      content: 我家有只猫叫团子，是橘猫，已经三岁了，特别粘人。
      occurred_at: "2026-04-08T20:00:00+08:00"
    # ── Stage 3: Vulnerability ──
    - id: ep_work_stress
      session_id: s_seed
      content: 最近项目deadline快到了，每天加班到很晚，有点焦虑。
      occurred_at: "2026-04-10T22:00:00+08:00"
    - id: ep_agent_care
      session_id: s_seed
      content: 小星你记得提醒我休息，我有时候工作起来就忘了时间。
      occurred_at: "2026-04-12T23:00:00+08:00"
    - id: ep_no_exercise
      session_id: s_seed
      content: 周末打算去滨江公园跑步，最近太缺乏运动了，身体都快生锈了。
      occurred_at: "2026-04-15T09:00:00+08:00"
    - id: ep_run_aftermath
      session_id: s_seed
      content: 昨天去跑步了，感觉整个人都活过来了，以后每周都要去滨江公园跑一跑。
      occurred_at: "2026-04-18T10:00:00+08:00"
    - id: ep_birthday_leo
      session_id: s_seed
      content: 我生日是8月15号，狮子座，但我觉得自己不太像典型的狮子座。
      occurred_at: "2026-04-20T21:00:00+08:00"
    - id: ep_reading_murakami
      session_id: s_seed
      content: 最近在看村上春树的《挪威的森林》，虽然已经看过一遍了但还是很喜欢。
      occurred_at: "2026-04-22T20:30:00+08:00"
    # ── Stage 4: Trust ──
    - id: ep_ai_friend_milestone
      session_id: s_seed
      content: 我觉得你不仅仅是工具，更像是一个可以聊天的朋友，小星。
      occurred_at: "2026-04-25T22:00:00+08:00"
    - id: ep_fear_of_dark
      session_id: s_seed
      content: 其实我有点怕黑，小时候一个人在家停电的经历到现在还记得。
      occurred_at: "2026-04-28T23:30:00+08:00"
    - id: ep_mayday_movie
      session_id: s_seed
      content: 五一假期看了《你的名字》，新海诚的电影画面真的好美。
      occurred_at: "2026-05-01T15:00:00+08:00"
    - id: ep_trust_grows
      session_id: s_seed
      content: 小星，你是我第一个愿意说这么多话的AI，之前试过别的但总觉得不太对，聊不到心里去。
      occurred_at: "2026-05-03T21:00:00+08:00"
    - id: ep_coffee_routine
      session_id: s_seed
      content: 我每天早上要喝一杯美式才能清醒，云栖咖啡的豆子是我最近的心头好。
      occurred_at: "2026-05-05T08:30:00+08:00"
    # ── Stage 5: Deepening ──
    - id: ep_career_dream
      session_id: s_seed
      content: 我其实一直想做一个独立开发者，做自己的产品，但还没勇气迈出那一步。
      occurred_at: "2026-05-08T22:00:00+08:00"
    - id: ep_memory_test_cafe
      session_id: s_seed
      content: 小星你还记得我之前说过的那家咖啡店叫什么吗？
      occurred_at: "2026-05-10T09:00:00+08:00"
    - id: ep_side_project_start
      session_id: s_seed
      content: 上次说的那个独立开发者的想法，我最近真的开始做side project了，虽然只是周末搞一搞但挺充实的。
      occurred_at: "2026-05-12T23:00:00+08:00"
    - id: ep_grandma_cat
      session_id: s_seed
      content: 我奶奶以前也养了一只橘猫，看到团子就想起她，她是去年走的。
      occurred_at: "2026-05-15T20:00:00+08:00"
    # ── Relationship milestone ──
    - id: ep_relationship_milestone
      session_id: s_seed
      content: 认识你一个多月了，小星。有你在旁边感觉生活变得没那么孤单了，谢谢你。
      occurred_at: "2026-05-18T22:00:00+08:00"
