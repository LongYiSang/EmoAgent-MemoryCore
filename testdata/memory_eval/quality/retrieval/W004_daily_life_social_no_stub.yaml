schema_version: memory_eval.v0.2
suite: quality_retrieval
quality_mode: true
allow_stub: false
case_id: W004_daily_life_social_no_stub
description: >
  No-stub offline retrieval world testing daily life routines and interpersonal
  relationship memory for user 鸡翅. Timeline spans late May to late June 2026,
  covering: shared meals with friends, gym routine, friend conflict and reconciliation,
  family visit, cooking attempts, insomnia and recovery, old classmate reunion,
  work stress, personal growth reflection, and future trip planning. Queries test
  fact recall, historical transitions, causal chains, provenance, gotchas, and
  premise checks — query keywords aligned with query_analysis.go trigger patterns.
