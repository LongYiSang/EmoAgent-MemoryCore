  episodes:
    - id: ep_hotpot_plan
      session_id: s_seed
      content: 小陈约我周末去吃蜀九香火锅，说是新开的店口碑特别好，要早点去排队。
      occurred_at: "2026-05-22T19:00:00+08:00"
    - id: ep_hotpot_experience
      session_id: s_seed
      content: 昨天和小陈去吃了蜀九香，毛肚和鹅肠特别新鲜，就是排队等了一个半小时，吃完都十点多了。
      occurred_at: "2026-05-25T22:00:00+08:00"
    - id: ep_gym_start
      session_id: s_seed
      content: 最近在力美健身房办了卡，每周二周四下班后去练，已经坚持两周了，感觉状态在变好。
      occurred_at: "2026-05-27T21:00:00+08:00"
    - id: ep_conflict_li
      session_id: s_seed
      content: 跟同事小李在工作群里发生了争执，他说话太冲了没给我留面子，我一生气直接退了群。
      occurred_at: "2026-05-29T16:00:00+08:00"
    - id: ep_li_apology
      session_id: s_seed
      content: 小李私下找我道歉了，说他最近项目压力太大情绪没控制好，我也跟他直说了当时为什么生气，算是翻篇了。
      occurred_at: "2026-05-31T20:00:00+08:00"
    - id: ep_sister_visit
      session_id: s_seed
      content: 妹妹周末来上海看我了，带她去了外滩、南京路和城隍庙，她吃南翔小笼包的时候开心得像个小孩，好久没看她这么笑了。
      occurred_at: "2026-06-02T21:00:00+08:00"
    - id: ep_sore_legs
      session_id: s_seed
      content: 昨天练腿练太猛了，今天上下楼梯都像在受刑，小陈在食堂看到我走路笑我说像企鹅。
      occurred_at: "2026-06-06T12:00:00+08:00"
    - id: ep_cooking_attempt
      session_id: s_seed
      content: 今天自己在家试着做了糖醋排骨，虽然卖相不太行颜色有点深，但味道居然还不错，发了照片给小陈看。
      occurred_at: "2026-06-08T19:00:00+08:00"
    - id: ep_insomnia
      session_id: s_seed
      content: 最近睡眠很差，经常熬到凌晨两三点才睡着，白天整个人都是恍惚的，咖啡喝了三杯也没用。
      occurred_at: "2026-06-10T23:00:00+08:00"
    - id: ep_chen_advice
      session_id: s_seed
      content: 小陈建议我睡前放下手机，试试听白噪音或者下雨声，说他之前失眠也是这样慢慢调整过来的。
      occurred_at: "2026-06-12T21:00:00+08:00"
    - id: ep_sleep_improved
      session_id: s_seed
      content: 试了小陈说的白噪音方法，昨晚十一点就睡着了，一觉到天亮，今天感觉整个人都活过来了。
      occurred_at: "2026-06-14T08:00:00+08:00"
    - id: ep_old_classmate
      session_id: s_seed
      content: 大学同学老张突然联系我，说来上海出差想聚一聚，毕业之后快三年没见了，他在深圳做跨境电商创业。
      occurred_at: "2026-06-16T18:00:00+08:00"
    - id: ep_reunion_zhang
      session_id: s_seed
      content: 跟老张吃了顿饭，聊了好多大学时候的糗事，他在深圳做跨境电商挺不容易的，团队才五个人什么都要自己扛。
      occurred_at: "2026-06-18T22:00:00+08:00"
    - id: ep_work_overtime
      session_id: s_seed
      content: 最近项目赶进度连续加了四天班，每天都到十点多，感觉身体被掏空了，跟小李吐槽了一整个午休。
      occurred_at: "2026-06-20T22:00:00+08:00"
    - id: ep_weight_loss
      session_id: s_seed
      content: 今天称体重发现瘦了三公斤，小陈说我脸都小了一圈，健身房没白去，挺有成就感的。
      occurred_at: "2026-06-22T20:00:00+08:00"
    - id: ep_hiking_sheshan
      session_id: s_seed
      content: 周末一个人去佘山爬了山，在山顶吹着风发了很久的呆，最近加班和人际方面的压力好像都被吹散了。
      occurred_at: "2026-06-24T16:00:00+08:00"
    - id: ep_reflection
      session_id: s_seed
      content: 和小陈聊起最近的改变，发现这两个月变化挺大的，开始坚持运动了，也会主动处理跟朋友之间的矛盾了，不再像以前一样憋在心里。
      occurred_at: "2026-06-26T21:00:00+08:00"
    - id: ep_zhoushan_plan
      session_id: s_seed
      content: 和小陈、小李商量下个月一起去舟山玩，海岛上住两晚，民宿已经订好了，好久没有三个人一起出去旅游了。
      occurred_at: "2026-06-28T20:00:00+08:00"
    - id: ep_li_treat
      session_id: s_seed
      content: 今天小李主动请大家喝了奶茶，说是庆祝项目终于上线了，感觉那次吵架之后他也在慢慢调整自己。
      occurred_at: "2026-06-30T15:00:00+08:00"
